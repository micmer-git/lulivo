<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Ulivo — Ordini</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep:#2d5016; --green-mid:#4a7c23; --green-light:#6ba33a; --green-xlight:#e8f5e0;
      --gold:#c5960c; --gold-light:#f0d060; --cream:#faf8f0; --warm:#f5f0e0;
      --text:#1a1a1a; --muted:#555; --slate:#e2e8f0; --white:#fff;
      --red:#c0392b; --wa:#25d366; --font:'Inter',system-ui,sans-serif; --display:'Oswald',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--cream);color:var(--text);min-height:100vh}

    /* Login */
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a3a08,var(--green-deep))}
    .login-box{background:var(--white);padding:2.5rem;width:90%;max-width:380px;text-align:center;border:2px solid var(--green-deep);box-shadow:8px 8px 0 var(--green-deep)}
    .login-box h1{font-family:var(--display);color:var(--green-deep);margin-bottom:.5rem;font-size:1.8rem}
    .login-box p{color:var(--muted);margin-bottom:1.5rem;font-size:.9rem}
    .login-box input{width:100%;padding:.75rem 1rem;border:2px solid var(--slate);font-size:1rem;margin-bottom:1rem;text-align:center;outline:none}
    .login-box input:focus{border-color:var(--green-mid)}
    .login-box button{width:100%;padding:.75rem;background:var(--green-deep);color:var(--white);border:2px solid var(--green-deep);font-size:1rem;font-weight:700;cursor:pointer;box-shadow:4px 4px 0 rgba(0,0,0,.2)}
    .login-box button:hover{background:var(--green-mid)}
    .login-error{color:var(--red);font-size:.9rem;margin-top:.5rem;display:none}

    /* Dashboard */
    .dashboard{display:none}
    .dash-header{background:var(--green-deep);color:var(--white);padding:.85rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .dash-header h1{font-family:var(--display);font-size:1.3rem;letter-spacing:.02em}
    .btn-logout{background:rgba(255,255,255,.12);color:var(--white);border:1.5px solid rgba(255,255,255,.3);padding:.4rem 1rem;cursor:pointer;font-weight:600;font-size:.8rem}
    .btn-logout:hover{background:rgba(255,255,255,.25)}

    /* Tabs */
    .dash-tabs{display:flex;background:var(--white);border-bottom:2px solid var(--green-deep);position:sticky;top:52px;z-index:9}
    .dash-tab{flex:1;padding:.75rem;border:none;background:none;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
    .dash-tab:hover{color:var(--green-deep);background:var(--green-xlight)}
    .dash-tab.active{color:var(--green-deep);border-bottom-color:var(--gold)}

    .tab-panel{display:none;padding:1rem}
    .tab-panel.active{display:block}

    /* Stats bar */
    .stats-bar{display:flex;gap:.75rem;padding:1rem;flex-wrap:wrap}
    .stat-card{background:var(--white);border:2px solid var(--green-deep);box-shadow:4px 4px 0 var(--green-deep);padding:1rem 1.25rem;flex:1;min-width:110px;text-align:center}
    .stat-card .num{font-family:var(--display);font-size:1.8rem;font-weight:700;color:var(--green-deep)}
    .stat-card .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:.15rem}

    /* Filters */
    .filters{padding:0 1rem;display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
    .filter-btn{padding:.35rem .75rem;border:2px solid var(--green-deep);background:var(--white);font-weight:700;font-size:.8rem;color:var(--green-deep);cursor:pointer;box-shadow:3px 3px 0 var(--green-deep);transition:all .15s}
    .filter-btn:hover,.filter-btn.active{transform:translate(3px,3px);box-shadow:0 0 0;background:var(--gold-light)}

    /* Order cards */
    .orders-list{padding:0 1rem 2rem}
    .order-card{background:var(--white);border:2px solid var(--green-deep);box-shadow:4px 4px 0 var(--green-deep);padding:1.25rem;margin-bottom:.75rem;border-left:4px solid var(--gold);transition:transform .15s,box-shadow .15s}
    .order-card:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--green-deep)}
    .order-card.completed{border-left-color:var(--green-light);opacity:.7}
    .order-card .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
    .order-card .customer{font-family:var(--display);font-weight:700;font-size:1.1rem}
    .order-card .time{color:var(--muted);font-size:.82rem}
    .order-card .mode{display:inline-block;background:var(--green-xlight);color:var(--green-deep);padding:.15rem .5rem;font-size:.75rem;font-weight:700;border:1px solid var(--green-mid)}
    .order-card .mode.delivery{background:#fff3e0;color:#e65100;border-color:#e65100}
    .order-card .items{margin:.5rem 0}
    .order-card .item-line{font-size:.88rem;padding:.15rem 0}
    .order-card .total{font-family:var(--display);font-weight:700;color:var(--green-deep);font-size:1.1rem;margin-top:.5rem}
    .order-card .notes{color:var(--muted);font-size:.82rem;font-style:italic;margin-top:.35rem}
    .order-card .actions{display:flex;gap:.5rem;margin-top:.75rem}
    .btn-action{padding:.35rem .75rem;border:2px solid;cursor:pointer;font-weight:700;font-size:.8rem;box-shadow:3px 3px 0;transition:all .15s}
    .btn-action:hover{transform:translate(3px,3px);box-shadow:0 0 0}
    .btn-done{background:var(--green-light);color:var(--white);border-color:var(--green-deep);box-shadow-color:var(--green-deep)}
    .btn-del{background:var(--red);color:var(--white);border-color:#8b1a1a;box-shadow-color:#8b1a1a}
    .btn-pending{background:var(--gold);color:var(--white);border-color:var(--green-deep);box-shadow-color:var(--green-deep)}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
    .empty-state .icon{font-size:3rem}

    /* Calendar */
    .calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;padding:0 1rem 2rem}
    .cal-day{background:var(--white);border:2px solid var(--green-deep);box-shadow:3px 3px 0 var(--green-deep);padding:1rem;text-align:center;cursor:pointer;transition:all .15s}
    .cal-day:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--green-deep);background:var(--green-xlight)}
    .cal-day.today{border-color:var(--gold);box-shadow-color:var(--gold)}
    .cal-day .day-num{font-family:var(--display);font-size:1.4rem;font-weight:700;color:var(--green-deep)}
    .cal-day .day-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .cal-day .day-stats{margin-top:.5rem;font-size:.78rem;color:var(--muted)}
    .cal-day .day-revenue{font-weight:700;color:var(--green-deep);font-size:.9rem}

    /* Inventory */
    .inv-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;padding:0 1rem 1rem}
    .inv-card{background:var(--white);border:2px solid var(--green-deep);box-shadow:4px 4px 0 var(--green-deep);padding:1.25rem;text-align:center}
    .inv-card .num{font-family:var(--display);font-size:2rem;font-weight:700;color:var(--green-deep)}
    .inv-card .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
    .inv-card.margin .num{color:var(--wa)}

    .inv-table{width:100%;border-collapse:collapse;margin:0 0 2rem}
    .inv-table th{background:var(--green-deep);color:var(--white);padding:.6rem .75rem;text-align:left;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em}
    .inv-table td{padding:.5rem .75rem;border-bottom:1px solid var(--slate);font-size:.88rem}
    .inv-table tr:hover td{background:var(--green-xlight)}
    .inv-table .cost{font-weight:700;color:var(--green-deep)}

    .date-picker{display:flex;align-items:center;gap:.5rem;padding:1rem;flex-wrap:wrap}
    .date-picker label{font-weight:700;font-size:.82rem;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}
    .date-picker input{padding:.4rem .6rem;border:2px solid var(--green-deep);font-size:.9rem;font-family:var(--font)}

    .auto-refresh{font-size:.72rem;color:var(--muted);text-align:center;padding:.5rem;opacity:.6}
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>L'Ulivo</h1>
      <p>Pannello Ordini</p>
      <input type="password" id="pwInput" placeholder="Password" autofocus />
      <button id="btnLogin">Accedi</button>
      <div class="login-error" id="loginError">Password errata</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <h1>L'Ulivo — Ordini</h1>
      <button class="btn-logout" id="btnLogout">Esci</button>
    </div>

    <div class="dash-tabs">
      <button class="dash-tab active" data-tab="orders">Ordini</button>
      <button class="dash-tab" data-tab="calendar">Calendario</button>
      <button class="dash-tab" data-tab="inventory">Inventario</button>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-panel active" id="tab-orders">
      <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">In attesa</div></div>
        <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">Completati</div></div>
        <div class="stat-card"><div class="num" id="statItems">0</div><div class="label">Pizze oggi</div></div>
        <div class="stat-card"><div class="num" id="statRevenue">€0</div><div class="label">Incasso</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tutti</button>
        <button class="filter-btn" data-filter="pending">In attesa</button>
        <button class="filter-btn" data-filter="completed">Completati</button>
      </div>
      <div class="orders-list" id="ordersList"></div>
    </div>

    <!-- CALENDAR TAB -->
    <div class="tab-panel" id="tab-calendar">
      <div style="padding:1rem;"><h2 style="font-family:var(--display);color:var(--green-deep);margin-bottom:.5rem">Storico Ordini</h2><p style="font-size:.88rem;color:var(--muted)">Click su un giorno per vedere i dettagli</p></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- INVENTORY TAB -->
    <div class="tab-panel" id="tab-inventory">
      <div class="date-picker">
        <label>Data:</label>
        <input type="date" id="invDate" />
      </div>
      <div class="inv-summary" id="invSummary"></div>
      <div style="padding:0 1rem">
        <h3 style="font-family:var(--display);color:var(--green-deep);margin-bottom:.75rem">Ingredienti Utilizzati</h3>
        <table class="inv-table" id="invTable">
          <thead><tr><th>Ingrediente</th><th>Quantità</th><th>Costo Unit.</th><th>Costo Tot.</th></tr></thead>
          <tbody id="invBody"></tbody>
        </table>
      </div>
    </div>

    <div class="auto-refresh">Aggiornamento automatico ogni 15 secondi</div>
  </div>

  <script>
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    let allOrders = [];
    let currentFilter = 'all';

    // --- Login ---
    async function login() {
      const pw = document.getElementById('pwInput').value;
      const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
      if (res.ok) { loginScreen.style.display='none'; dashboard.style.display='block'; loadAll(); }
      else document.getElementById('loginError').style.display='block';
    }
    document.getElementById('btnLogin').addEventListener('click', login);
    document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
    fetch('/api/auth').then(r=>r.json()).then(d=>{ if(d.authenticated){loginScreen.style.display='none';dashboard.style.display='block';loadAll();} });
    document.getElementById('btnLogout').addEventListener('click', async()=>{ await fetch('/api/logout',{method:'POST'}); dashboard.style.display='none'; loginScreen.style.display='flex'; document.getElementById('pwInput').value=''; });

    // --- Tabs ---
    document.querySelectorAll('.dash-tab').forEach(t=>{
      t.addEventListener('click',()=>{
        document.querySelectorAll('.dash-tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('tab-'+t.dataset.tab).classList.add('active');
        if(t.dataset.tab==='calendar') loadCalendar();
        if(t.dataset.tab==='inventory') loadInventory();
      });
    });

    // --- Filters ---
    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter=btn.dataset.filter;
        renderOrders();
      });
    });

    // --- Load all ---
    function loadAll(){ loadOrders(); }

    // --- Orders ---
    async function loadOrders(){
      try{
        const res=await fetch('/api/orders');
        if(res.status===401){dashboard.style.display='none';loginScreen.style.display='flex';return;}
        allOrders=await res.json();
        renderOrders();
      }catch(e){document.getElementById('ordersList').innerHTML='<div class="empty-state"><div class="icon">⚠️</div><p>Errore</p></div>';}
    }

    function renderOrders(){
      const today=new Date().toISOString().slice(0,10);
      const todayOrders=allOrders.filter(o=>o.timestamp?.startsWith(today));
      const pending=todayOrders.filter(o=>(o.status||'pending')==='pending');
      const completed=todayOrders.filter(o=>o.status==='completed');
      const items=todayOrders.reduce((s,o)=>s+(o.items||[]).reduce((ss,i)=>ss+(i.qty||1),0),0);

      document.getElementById('statPending').textContent=pending.length;
      document.getElementById('statDone').textContent=completed.length;
      document.getElementById('statItems').textContent=items;
      document.getElementById('statRevenue').textContent='€'+todayOrders.reduce((s,o)=>s+(o.totalPrice||0),0).toFixed(0);

      let filtered=allOrders;
      if(currentFilter==='pending') filtered=allOrders.filter(o=>(o.status||'pending')==='pending');
      if(currentFilter==='completed') filtered=allOrders.filter(o=>o.status==='completed');

      const list=document.getElementById('ordersList');
      if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Nessun ordine</p></div>';return;}

      list.innerHTML=filtered.map(o=>{
        const status=o.status||'pending';
        const isComp=status==='completed';
        const time=o.timestamp?new Date(o.timestamp).toLocaleString('it-IT',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):'';
        const items=(o.items||[]).map(i=>`<div class="item-line">${i.qty||1}× ${i.name}${i.removed?.length?' <span style="color:var(--red);font-size:.78rem">senza '+i.removed.join(', ')+'</span>':''}${i.added?.length?' <span style="color:var(--wa);font-size:.78rem">+ '+i.added.join(', ')+'</span>':''}${i.note?' <span style="color:var(--muted);font-size:.78rem;font-style:italic">'+i.note+'</span>':''} — €${((i.qty||1)*i.price).toFixed(2)}</div>`).join('');
        const modeClass=o.orderMode==='delivery'?'delivery':'';
        const modeLabel=o.orderMode==='delivery'?'🛵 Consegna':'🏠 Asporto';
        return `<div class="order-card ${isComp?'completed':''}">
          <div class="header"><div><span class="customer">${esc(o.customerName)}</span> <span class="mode ${modeClass}">${modeLabel}</span>${o.deliveryAddress?'<div style="font-size:.82rem;color:var(--muted);margin-top:.2rem">📍 '+esc(o.deliveryAddress)+'</div>':''}</div><span class="time">${time}</span></div>
          <div class="items">${items}</div>
          <div class="total">€${(o.totalPrice||0).toFixed(2)}</div>
          ${o.notes?'<div class="notes">📝 '+esc(o.notes)+'</div>':''}
          <div class="actions">${isComp?`<button class="btn-action btn-pending" onclick="setStatus('${o.id}','pending')">↩ Riapri</button>`:`<button class="btn-action btn-done" onclick="setStatus('${o.id}','completed')">✅ Completato</button>`}<button class="btn-action btn-del" onclick="delOrder('${o.id}')">🗑</button></div>
        </div>`;
      }).join('');
    }

    function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
    window.setStatus=async(id,status)=>{await fetch(`/api/orders/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});loadOrders();};
    window.delOrder=async(id)=>{if(!confirm('Eliminare?'))return;await fetch(`/api/orders/${id}`,{method:'DELETE'});loadOrders();};

    // --- Calendar ---
    async function loadCalendar(){
      try{
        const res=await fetch('/api/calendar');
        const data=await res.json();
        const grid=document.getElementById('calendarGrid');
        const today=new Date().toISOString().slice(0,10);
        const days=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

        if(!data.length){grid.innerHTML='<div class="empty-state"><div class="icon">📅</div><p>Nessun dato</p></div>';return;}

        grid.innerHTML=data.slice(0,30).map(d=>{
          const dt=new Date(d.date+'T12:00:00');
          const dayName=days[dt.getDay()];
          const dayNum=dt.getDate();
          const month=dt.toLocaleString('it-IT',{month:'short'});
          const isToday=d.date===today;
          return `<div class="cal-day ${isToday?'today':''}" onclick="showDayOrders('${d.date}')">
            <div class="day-label">${dayName} ${month}</div>
            <div class="day-num">${dayNum}</div>
            <div class="day-stats">${d.orders} ordini · ${d.items} pezzi</div>
            <div class="day-revenue">€${d.revenue.toFixed(0)}</div>
            ${d.pending?`<div style="font-size:.72rem;color:var(--gold);font-weight:700">${d.pending} in attesa</div>`:''}
          </div>`;
        }).join('');
      }catch(e){document.getElementById('calendarGrid').innerHTML='<div class="empty-state">Errore</div>';}
    }

    window.showDayOrders=function(date){
      // Switch to orders tab filtered by date
      document.querySelectorAll('.dash-tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      document.querySelector('[data-tab="orders"]').classList.add('active');
      document.getElementById('tab-orders').classList.add('active');
      // Filter
      const list=document.getElementById('ordersList');
      const dayOrders=allOrders.filter(o=>o.timestamp?.startsWith(date));
      if(!dayOrders.length){list.innerHTML=`<div class="empty-state"><p>Nessun ordine per ${date}</p></div>`;return;}
      currentFilter='all';
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-filter="all"]').classList.add('active');
      // Temporarily replace allOrders
      const orig=allOrders;
      allOrders=dayOrders;
      renderOrders();
      allOrders=orig;
    };

    // --- Inventory ---
    const invDateInput=document.getElementById('invDate');
    invDateInput.value=new Date().toISOString().slice(0,10);
    invDateInput.addEventListener('change',loadInventory);

    async function loadInventory(){
      const date=invDateInput.value;
      try{
        const res=await fetch(`/api/inventory?date=${date}`);
        const inv=await res.json();

        document.getElementById('invSummary').innerHTML=`
          <div class="inv-card"><div class="num">${inv.totalOrders}</div><div class="label">Ordini</div></div>
          <div class="inv-card"><div class="num">${inv.totalItems}</div><div class="label">Pezzi</div></div>
          <div class="inv-card"><div class="num">€${inv.totalRevenue.toFixed(0)}</div><div class="label">Incasso</div></div>
          <div class="inv-card"><div class="num">€${inv.estimatedCost.toFixed(0)}</div><div class="label">Costo stimato</div></div>
          <div class="inv-card margin"><div class="num">€${inv.estimatedMargin.toFixed(0)}</div><div class="label">Margine</div></div>
        `;

        const tbody=document.getElementById('invBody');
        if(!inv.ingredients.length){
          tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:2rem">Nessun dato per questa data</td></tr>';
          return;
        }
        tbody.innerHTML=inv.ingredients.map(i=>{
          const totalCost=(i.count*i.unitCost).toFixed(2);
          return `<tr><td>${i.name}</td><td>${i.count}</td><td>€${i.unitCost.toFixed(2)}</td><td class="cost">€${totalCost}</td></tr>`;
        }).join('');
      }catch(e){document.getElementById('invSummary').innerHTML='<div class="empty-state">Errore</div>';}
    }

    // Auto-refresh
    setInterval(loadOrders, 15000);
  </script>
</body>
</html>
